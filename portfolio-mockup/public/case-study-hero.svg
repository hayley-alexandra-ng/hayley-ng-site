  <path d="M242 160 L238 220 Q236 240 240 260 Q242 265 245 260 L248 220 Q250 190 250 170 Z" fill="#2D2D2D"/>
  <path d="M318 160 L322 220 Q324 240 320 260 Q318 265 315 260 L312 220 Q310 190 310 170 Z" fill="#2D2D2D"/>

  <!-- Face features -->
  <!-- Eyes -->
