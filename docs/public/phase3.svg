<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <!-- Phase 3: Build Week & Gallery - Abstract building/creating with layered organic forms -->
  <rect width="400" height="240" fill="#FDF2F0"/>
  <!-- Background organic shapes -->
  <ellipse cx="300" cy="180" rx="80" ry="60" fill="#E8C4C0" opacity="0.3"/>
  <ellipse cx="80" cy="60" rx="50" ry="40" fill="#D4A5A0" opacity="0.2"/>
  <!-- Abstract code/terminal window -->
  <rect x="50" y="60" width="140" height="100" rx="6" fill="#2D2D2D" opacity="0.85"/>
  <rect x="50" y="60" width="140" height="16" rx="6" fill="#3D3D3D" opacity="0.9"/>
  <circle cx="62" cy="68" r="3" fill="#E85C5C" opacity="0.8"/>
  <circle cx="72" cy="68" r="3" fill="#E8C44D" opacity="0.8"/>
  <circle cx="82" cy="68" r="3" fill="#5CE85C" opacity="0.8"/>
  <!-- Code lines -->
  <rect x="60" y="84" width="40" height="3" rx="1.5" fill="#C17A7A" opacity="0.7"/>
  <rect x="60" y="94" width="70" height="3" rx="1.5" fill="#D4A5A0" opacity="0.6"/>
  <rect x="70" y="104" width="55" height="3" rx="1.5" fill="#E8C4C0" opacity="0.6"/>
  <rect x="70" y="114" width="80" height="3" rx="1.5" fill="#D4A5A0" opacity="0.5"/>
  <rect x="60" y="124" width="45" height="3" rx="1.5" fill="#C89090" opacity="0.6"/>
  <rect x="60" y="134" width="60" height="3" rx="1.5" fill="#E8C4C0" opacity="0.5"/>
  <!-- Arrow from code to gallery -->
  <path d="M200 110 Q230 110 250 100" stroke="#A85C5C" stroke-width="2" opacity="0.4" fill="none" stroke-linecap="round" stroke-dasharray="4 4"/>
  <!-- Abstract gallery grid -->
  <rect x="260" y="50" width="50" height="50" rx="4" fill="#C89090" opacity="0.5"/>
  <rect x="320" y="50" width="50" height="50" rx="4" fill="#D4A5A0" opacity="0.5"/>
  <rect x="260" y="110" width="50" height="50" rx="4" fill="#B56B6B" opacity="0.4"/>
  <rect x="320" y="110" width="50" height="50" rx="4" fill="#E8C4C0" opacity="0.6"/>
  <!-- Small artwork representations inside gallery -->
  <circle cx="285" cy="75" r="12" fill="#A85C5C" opacity="0.4"/>
  <rect x="332" y="62" width="26" height="26" rx="2" fill="#C17A7A" opacity="0.3"/>
  <path d="M275 125 L285 115 L295 125 L285 135Z" fill="#D4A5A0" opacity="0.5"/>
  <ellipse cx="345" cy="135" rx="14" ry="10" fill="#C89090" opacity="0.4"/>
  <!-- Floating creative sparks -->
  <circle cx="230" cy="60" r="3" fill="#C17A7A" opacity="0.5"/>
  <circle cx="245" cy="180" r="4" fill="#D4A5A0" opacity="0.4"/>
  <path d="M140 200 L143 193 L146 200 L143 207Z" fill="#B56B6B" opacity="0.4"/>
  <!-- "76" subtle text accent -->
  <text x="290" y="200" font-family="Georgia, serif" font-size="28" fill="#A85C5C" opacity="0.25" font-weight="bold">76</text>
</svg>
