  <ellipse cx="292" cy="168" rx="5" ry="4.5" fill="#2D2D2D"/>
  <ellipse cx="269" cy="167" rx="2" ry="2" fill="white" opacity="0.6"/>
  <ellipse cx="293" cy="167" rx="2" ry="2" fill="white" opacity="0.6"/>
  <!-- Eyebrows -->
  <path d="M261 160 Q268 157 275 159" stroke="#2D2D2D" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M285 159 Q292 157 299 160" stroke="#2D2D2D" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M278 174 Q280 178 282 174" stroke="#D4A088" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Big warm smile -->
  <path d="M265 185 Q280 196 295 185" stroke="#C4756A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M268 186 Q280 194 292 186" fill="#E88080" opacity="0.3"/>
  <!-- Blush -->
  <ellipse cx="260" cy="180" rx="7" ry="4" fill="#E8A0A0" opacity="0.25"/>
  <ellipse cx="300" cy="180" rx="7" ry="4" fill="#E8A0A0" opacity="0.25"/>

  <!-- Earrings - geometric tassel style like in photo -->
  <path d="M244 170 L240 178 L244 186 L248 178 Z" fill="#A0B5A8" opacity="0.7"/>
  <path d="M316 170 L312 178 L316 186 L320 178 Z" fill="#A0B5A8" opacity="0.7"/>

  <!-- Raised hand/gesture -->
  <path d="M335 220 Q345 200 350 190 Q352 185 355 188 Q353 195 348 208 L340 230 Z" fill="#F0C9A8"/>

