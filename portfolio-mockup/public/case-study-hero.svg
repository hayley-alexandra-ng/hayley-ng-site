  <path d="M350 190 Q370 160 380 140" stroke="#C17A7A" stroke-width="1.5" opacity="0.3" fill="none" stroke-dasharray="3 3"/>
  <path d="M340 230 Q380 230 420 225" stroke="#C17A7A" stroke-width="1.5" opacity="0.3" fill="none" stroke-dasharray="3 3"/>

  <!-- Sparkle accents -->
  <path d="M140 80 L143 73 L146 80 L143 87Z" fill="#D4A5A0" opacity="0.5"/>
  <path d="M500 80 L502 75 L504 80 L502 85Z" fill="#C89090" opacity="0.4"/>
  <path d="M100 200 L102 196 L104 200 L102 204Z" fill="#B56B6B" opacity="0.4"/>
  <path d="M550 170 L552 166 L554 170 L552 174Z" fill="#E8C4C0" opacity="0.5"/>

