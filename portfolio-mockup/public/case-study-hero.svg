  <circle cx="389" cy="126" r="2.5" fill="#E85C5C" opacity="0.7"/>
  <circle cx="396" cy="126" r="2.5" fill="#E8C44D" opacity="0.7"/>
  <circle cx="403" cy="126" r="2.5" fill="#5CE85C" opacity="0.7"/>
  <rect x="390" y="138" width="30" height="2.5" rx="1" fill="#C17A7A" opacity="0.6"/>
  <rect x="390" y="146" width="50" height="2.5" rx="1" fill="#D4A5A0" opacity="0.5"/>
  <rect x="395" y="154" width="40" height="2.5" rx="1" fill="#E8C4C0" opacity="0.5"/>
  <rect x="390" y="162" width="35" height="2.5" rx="1" fill="#D4A5A0" opacity="0.5"/>

