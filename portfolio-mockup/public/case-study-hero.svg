  <circle cx="420" cy="220" r="8" fill="#C89090" opacity="0.5"/>
  <circle cx="440" cy="230" r="7" fill="#B56B6B" opacity="0.4"/>
  <circle cx="460" cy="218" r="8" fill="#D4A5A0" opacity="0.5"/>
  <circle cx="480" cy="228" r="7" fill="#C17A7A" opacity="0.4"/>
  <circle cx="500" cy="215" r="6" fill="#C89090" opacity="0.45"/>
  <circle cx="435" cy="250" r="6" fill="#E8C4C0" opacity="0.5"/>
  <circle cx="455" cy="255" r="7" fill="#B56B6B" opacity="0.35"/>
  <circle cx="475" cy="248" r="6" fill="#D4A5A0" opacity="0.4"/>
  <circle cx="495" cy="252" r="7" fill="#C89090" opacity="0.4"/>
  <circle cx="515" cy="240" r="5" fill="#C17A7A" opacity="0.35"/>
  <circle cx="420" cy="270" r="5" fill="#D4A5A0" opacity="0.3"/>
  <circle cx="445" cy="275" r="6" fill="#C89090" opacity="0.35"/>
  <circle cx="470" cy="272" r="5" fill="#B56B6B" opacity="0.3"/>

