  <ellipse cx="400" cy="300" rx="120" ry="60" fill="#C89090" opacity="0.12"/>

  <!-- Cartoon Hayley - center-left -->
  <!-- Body/blazer -->
  <path d="M230 340 L230 240 Q230 220 250 215 L270 210 Q280 208 290 210 L310 215 Q330 220 330 240 L330 340" fill="#C4BFB8" opacity="0.85"/>
  <!-- White top -->
