  <!-- Soft watercolor-style edge texture -->
  <ellipse cx="50" cy="50" rx="40" ry="30" fill="#E8C4C0" opacity="0.15"/>
  <ellipse cx="560" cy="310" rx="35" ry="25" fill="#D4A5A0" opacity="0.15"/>
